<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- PWA essential meta tags -->
    <meta name="theme-color" content="#2563EB" />
    <meta name="background-color" content="#0F1B4C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Buddy AI" />
    <meta name="application-name" content="Buddy AI" />
    <meta name="msapplication-TileColor" content="#0F1B4C" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/icons/icon-144.png" />

    <!-- SEO + Share -->
    <meta name="description" content="Buddy AI — Social platform, AI chat, and marketplace in one app. Talk to Buddy and get things done." />
    <meta property="og:title" content="Buddy AI" />
    <meta property="og:description" content="Your Social AI Platform — Chat, Order, Connect" />
    <meta property="og:image" content="%PUBLIC_URL%/icons/icon-512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />

    <!-- Favicon + Apple icons -->
    <link rel="icon" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="%PUBLIC_URL%/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="%PUBLIC_URL%/icons/icon-128.png" />
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/icons/icon-512.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Razorpay checkout (for UPI payments) -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <title>Buddy AI</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Buddy AI.</noscript>
    <div id="root"></div>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('Buddy SW registered:', reg.scope);
            })
            .catch(function(err) {
              console.log('Buddy SW registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
